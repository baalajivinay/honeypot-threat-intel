<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honeypot Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: monospace; padding: 20px; }
    h1 { color: #ff4444; text-align: center; margin-bottom: 20px; font-size: 24px; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; text-align: center; }
    .card h2 { font-size: 36px; color: #ff4444; }
    .card p { color: #8b949e; margin-top: 6px; }
    table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 8px; overflow: hidden; }
    th { background: #21262d; padding: 12px; text-align: left; color: #8b949e; font-size: 12px; text-transform: uppercase; }
    td { padding: 12px; border-top: 1px solid #30363d; font-size: 13px; }
    tr:hover { background: #1c2128; }
    .success { color: #ff4444; }
    .failed { color: #f0883e; }
    h3 { color: #8b949e; margin: 24px 0 12px; }
  </style>
</head>
<body>
  <h1>🍯 Honeypot Threat Dashboard</h1>

  <div class="stats">
    <div class="card">
      <h2 id="total">0</h2>
      <p>Total Attacks</p>
    </div>
    <div class="card">
      <h2 id="unique">0</h2>
      <p>Unique IPs</p>
    </div>
  </div>

  <h3>Recent Attacks</h3>
  <table>
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>IP</th>
        <th>Username</th>
        <th>Password</th>
        <th>Event</th>
      </tr>
    </thead>
    <tbody id="attacks-table"></tbody>
  </table>

  <script>
    async function loadStats() {
      const r = await fetch('/api/stats');
      const data = await r.json();
      document.getElementById('total').textContent = data.total;
      document.getElementById('unique').textContent = data.unique_ips;
    }

    async function loadAttacks() {
      const r = await fetch('/api/attacks');
      const data = await r.json();
      const tbody = document.getElementById('attacks-table');
      tbody.innerHTML = '';
      data.forEach(a => {
        const cls = a.event_type.includes('success') ? 'success' : 'failed';
        tbody.innerHTML += `
          <tr>
            <td>${a.timestamp}</td>
            <td>${a.src_ip}</td>
            <td>${a.username}</td>
            <td>${a.password}</td>
            <td class="${cls}">${a.event_type}</td>
          </tr>`;
      });
    }

    loadStats();
    loadAttacks();
    setInterval(() => { loadStats(); loadAttacks(); }, 5000);
  </script>
</body>
</html>
